<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thriftly – Buy & Sell Pre-loved Items</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a class="topbar-logo" href="index.html">Thrift<span>ly</span></a>
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-size:13px;color:var(--text3);">Mumbai</span>
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="var(--text2)" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" type="text" placeholder="Search clothes, electronics, books…"
      onkeydown="handleSearch(event)">
    <button onclick="handleSearch({type:'click'})" style="background:none;border:none;cursor:pointer;color:var(--accent);font-weight:600;font-size:13px;">Go</button>
  </div>
</div>

<!-- CATEGORY QUICK CHIPS -->
<div class="cat-chips">
  <a class="cat-chip" href="categories.html?cat=All">
    <div class="cat-chip-icon">🏪</div>
    <span>All</span>
  </a>
  <a class="cat-chip" href="categories.html?cat=Electronics">
    <div class="cat-chip-icon">📱</div>
    <span>Electronics</span>
  </a>
  <a class="cat-chip" href="categories.html?cat=Fashion">
    <div class="cat-chip-icon">👗</div>
    <span>Fashion</span>
  </a>
  <a class="cat-chip" href="categories.html?cat=Household">
    <div class="cat-chip-icon">🛋️</div>
    <span>Household</span>
  </a>
  <a class="cat-chip" href="categories.html?cat=Games+%26+Toys">
    <div class="cat-chip-icon">🎮</div>
    <span>Games</span>
  </a>
  <a class="cat-chip" href="categories.html?cat=Books">
    <div class="cat-chip-icon">📚</div>
    <span>Books</span>
  </a>
</div>

<!-- TRENDING -->
<div id="trending-section">
  <div class="section-label">
    <h2>🔥 Trending Now</h2>
    <a href="categories.html">See all</a>
  </div>
  <div class="scroll-row" id="trending-row">
    <div class="skeleton" style="min-width:160px;height:220px;border-radius:14px;"></div>
    <div class="skeleton" style="min-width:160px;height:220px;border-radius:14px;"></div>
    <div class="skeleton" style="min-width:160px;height:220px;border-radius:14px;"></div>
  </div>
</div>

<!-- LATEST -->
<div class="section-label" id="latest-label">
  <h2>✨ Just Listed</h2>
  <a href="categories.html">View all</a>
</div>
<div class="products-grid" id="latest-grid">
  <div class="skeleton" style="height:240px;border-radius:14px;"></div>
  <div class="skeleton" style="height:240px;border-radius:14px;"></div>
  <div class="skeleton" style="height:240px;border-radius:14px;"></div>
  <div class="skeleton" style="height:240px;border-radius:14px;"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item active" href="index.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </a>
  <a class="nav-item" href="categories.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <span>Categories</span>
  </a>
  <a class="nav-item nav-sell" href="sell.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span>Sell</span>
  </a>
  <a class="nav-item" href="cart.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span>Cart</span>
  </a>
  <a class="nav-item" href="profile.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
</nav>

<!-- PRODUCT DETAIL MODAL -->
<div class="modal-overlay" id="product-modal" onclick="if(event.target===this) closeModal('product-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="product-modal-body"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>
</html>
