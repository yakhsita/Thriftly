<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Thriftly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

<div class="auth-page">
  <div class="auth-logo">Thrift<span>ly</span></div>
  <div class="auth-tagline">One person's treasure is another's deal 🛍️</div>

  <div class="auth-card">
    <h2>Welcome back</h2>
    <p>Sign in to continue buying & selling</p>

    <div class="form-group">
      <label for="email">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="btn-primary" id="auth-btn" onclick="login()">Sign In</button>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
