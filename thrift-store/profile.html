<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – Thriftly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="index.html">Thrift<span>ly</span></a>
  <button onclick="logout()" style="background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;">Sign out</button>
</div>

<!-- Profile header -->
<div class="profile-header">
  <div class="avatar" id="avatar-initials">?</div>
  <div>
    <div class="profile-name" id="profile-name">Loading…</div>
    <div class="profile-email" id="profile-email"></div>
  </div>
</div>

<!-- Tabs -->
<div class="profile-tabs">
  <div class="profile-tab active" data-tab="orders" onclick="switchTab('orders')">Orders</div>
  <div class="profile-tab" data-tab="favorites" onclick="switchTab('favorites')">Favorites</div>
  <div class="profile-tab" data-tab="settings" onclick="switchTab('settings')">Settings</div>
</div>

<!-- Orders Tab -->
<div class="tab-content active" id="tab-orders">
  <div id="orders-list">
    <div class="skeleton" style="height:72px;border-radius:14px;margin-bottom:10px;"></div>
    <div class="skeleton" style="height:72px;border-radius:14px;margin-bottom:10px;"></div>
  </div>
</div>

<!-- Favorites Tab -->
<div class="tab-content" id="tab-favorites">
  <div id="favs-list">
    <div class="skeleton" style="height:200px;border-radius:14px;"></div>
  </div>
</div>

<!-- Settings Tab -->
<div class="tab-content" id="tab-settings">

  <div class="sell-section" style="margin-bottom:12px;">
    <div class="sell-section-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Personal Info
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input class="form-input" type="text" id="set-name" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input class="form-input" type="tel" id="set-phone" placeholder="+91 XXXXX XXXXX">
    </div>
    <div class="form-group">
      <label>Default Address</label>
      <textarea class="form-input" id="set-address" rows="2" placeholder="Your address for pickups"></textarea>
    </div>
    <button class="btn-primary" id="save-settings-btn" onclick="saveSettings()">Save Changes</button>
  </div>

  <div class="sell-section" style="margin-bottom:12px;">
    <div class="sell-section-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Change Password
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input class="form-input" type="password" id="new-password" placeholder="Min. 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input class="form-input" type="password" id="confirm-password" placeholder="Repeat new password">
    </div>
    <button class="btn-secondary" onclick="changePassword()">Update Password</button>
  </div>

  <div style="margin-bottom:24px;">
    <button onclick="logout()" style="width:100%;background:rgba(200,75,49,0.08);color:var(--accent);border:1.5px solid rgba(200,75,49,0.3);border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;">
      Sign Out
    </button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </a>
  <a class="nav-item" href="categories.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <span>Categories</span>
  </a>
  <a class="nav-item nav-sell" href="sell.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span>Sell</span>
  </a>
  <a class="nav-item" href="cart.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span>Cart</span>
  </a>
  <a class="nav-item active" href="profile.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
</nav>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
