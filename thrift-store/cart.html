<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – Thriftly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <a href="index.html" style="color:var(--text);text-decoration:none;">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:18px;">My Cart</span>
  <div style="width:22px;"></div>
</div>

<!-- Empty state -->
<div class="empty-state" id="cart-empty" style="display:none;">
  <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  <h3>Your cart is empty</h3>
  <p>Browse items and add them to your cart</p>
  <a href="index.html" style="display:inline-block;margin-top:16px;background:var(--accent);color:#fff;padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;">Start Shopping</a>
</div>

<!-- Cart items -->
<div class="cart-list" id="cart-list"></div>

<!-- Summary -->
<div class="cart-summary" id="cart-summary">
  <div class="cart-summary-row">
    <span>Subtotal</span>
    <span id="subtotal">₹0</span>
  </div>
  <div class="cart-summary-row">
    <span>Platform fee</span>
    <span>Free</span>
  </div>
  <div class="cart-summary-row total">
    <span>Total</span>
    <span id="total">₹0</span>
  </div>
</div>

<button class="checkout-btn" id="checkout-btn" onclick="checkout()">
  Proceed to Checkout →
</button>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </a>
  <a class="nav-item" href="categories.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <span>Categories</span>
  </a>
  <a class="nav-item nav-sell" href="sell.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span>Sell</span>
  </a>
  <a class="nav-item active" href="cart.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span>Cart</span>
  </a>
  <a class="nav-item" href="profile.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
</nav>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
