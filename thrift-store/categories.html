<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories – Thriftly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="index.html">Thrift<span>ly</span></a>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" type="text" placeholder="Search in category…" onkeydown="if(event.key==='Enter') filterProducts()">
  </div>
</div>

<!-- CATEGORY TABS -->
<div class="cat-chips" id="cat-filter-chips">
  <!-- injected by JS -->
</div>

<!-- RESULTS -->
<div id="results-section">
  <div class="section-label">
    <h2 id="results-label">All Items</h2>
    <span id="results-count" style="font-size:13px;color:var(--text3);"></span>
  </div>
  <div class="products-grid" id="results-grid">
    <div class="skeleton" style="height:240px;border-radius:14px;"></div>
    <div class="skeleton" style="height:240px;border-radius:14px;"></div>
    <div class="skeleton" style="height:240px;border-radius:14px;"></div>
    <div class="skeleton" style="height:240px;border-radius:14px;"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </a>
  <a class="nav-item active" href="categories.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <span>Categories</span>
  </a>
  <a class="nav-item nav-sell" href="sell.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span>Sell</span>
  </a>
  <a class="nav-item" href="cart.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span>Cart</span>
  </a>
  <a class="nav-item" href="profile.html">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </a>
</nav>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="product-modal" onclick="if(event.target===this) closeModal('product-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="product-modal-body"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
  const cats = ['All', 'Electronics', 'Fashion', 'Household', 'Games & Toys', 'Books'];
  const catIcons = { All:'🏪', Electronics:'📱', Fashion:'👗', Household:'🛋️', 'Games & Toys':'🎮', Books:'📚' };
  let activecat = new URLSearchParams(window.location.search).get('cat') || 'All';

  function renderCatChips() {
    const el = document.getElementById('cat-filter-chips');
    el.innerHTML = cats.map(c => `
      <div class="cat-chip ${c === activecat ? 'active' : ''}" onclick="selectCat('${c}')">
        <div class="cat-chip-icon">${catIcons[c]}</div>
        <span>${c}</span>
      </div>`).join('');
  }

  async function selectCat(cat) {
    activecat = cat;
    renderCatChips();
    loadProducts();
  }

  async function loadProducts() {
    const grid = document.getElementById('results-grid');
    const label = document.getElementById('results-label');
    const count = document.getElementById('results-count');
    grid.innerHTML = '<div class="skeleton" style="height:240px;border-radius:14px;"></div><div class="skeleton" style="height:240px;border-radius:14px;"></div>';
    label.textContent = activecat === 'All' ? 'All Items' : activecat;

    let query = db.from('products').select('*').order('created_at', {ascending: false});
    if (activecat !== 'All') query = query.eq('category', activecat);

    const q = document.getElementById('search-input').value.trim();
    if (q) query = query.ilike('title', `%${q}%`);

    const { data } = await query;
    count.textContent = data ? `${data.length} item${data.length !== 1 ? 's' : ''}` : '';

    if (!data || data.length === 0) {
      grid.innerHTML = '<p style="color:var(--text3);font-size:14px;padding:0 4px;grid-column:span 2;">No items found in this category.</p>';
    } else {
      grid.innerHTML = data.map(p => buildProductCard(p)).join('');
    }
  }

  function filterProducts() { loadProducts(); }

  document.addEventListener('DOMContentLoaded', () => {
    renderCatChips();
    loadProducts();
  });
</script>
</body>
</html>
